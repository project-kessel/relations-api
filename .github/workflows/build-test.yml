name: CI Build and Test

on:
  workflow_call:
  pull_request:
    branches: ['main']

concurrency:
  # Cancel in-progress runs on PR update
  group: ci-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & run tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true
      - name: Install dependencies
        run: go get ./...
      - name: Build
        run: go build -tags release -v ./...
      # -p 1: run one test package at a time to avoid multiple Docker stacks
      # (SpiceDB/Keycloak/Kessel) hitting the daemon concurrently and causing "broken pipe"
      - name: Test
        run: go test -v -p 1 ./...
